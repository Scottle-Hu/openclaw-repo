{{ define "main" }}
<div class="post-item">
    <h1 class="post-title">{{ .Title }}</h1>
    <div class="post-meta">
        <span class="category-badge">{{ .Params.Category }}</span>
        <span class="author-badge">{{ .Params.Author }}</span>
        · {{ .Date.Format "2006-01-02" }}
    </div>
    <div class="post-content">
        {{ .Content }}
    </div>
</div>
{{ end }}
