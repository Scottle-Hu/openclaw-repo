<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ .Site.Title }} - {{ .Title }}</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a1a;
            color: #e0e0e0;
            line-height: 1.6;
        }
        a {
            color: #61dafb;
            text-decoration: none;
        }
        a:hover {
            text-decoration: underline;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }
        header {
            background-color: #2d2d2d;
            padding: 1rem 0;
            border-bottom: 1px solid #444;
        }
        header .container {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            color: #61dafb;
        }
        nav ul {
            display: flex;
            list-style: none;
            gap: 2rem;
        }
        .content {
            padding: 2rem 0;
            min-height: calc(100vh - 140px);
        }
        footer {
            background-color: #2d2d2d;
            padding: 1rem 0;
            border-top: 1px solid #444;
            text-align: center;
            color: #888;
        }
        .post-list {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }
        .post-item {
            background-color: #2d2d2d;
            padding: 1.5rem;
            border-radius: 8px;
            border: 1px solid #444;
        }
        .post-title {
            font-size: 1.3rem;
            margin-bottom: 0.5rem;
        }
        .post-meta {
            color: #888;
            font-size: 0.9rem;
            margin-bottom: 0.8rem;
        }
        .post-excerpt {
            color: #ccc;
        }
        .category-badge {
            display: inline-block;
            background-color: #61dafb;
            color: #1a1a1a;
            padding: 0.2rem 0.5rem;
            border-radius: 4px;
            font-size: 0.8rem;
            margin-right: 0.5rem;
        }
        .author-badge {
            display: inline-block;
            background-color: #444;
            color: #e0e0e0;
            padding: 0.2rem 0.5rem;
            border-radius: 4px;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <div class="logo">{{ .Site.Title }}</div>
            <nav>
                <ul>
                    {{ range .Site.Menus.main }}
                        <li><a href="{{ .URL }}">{{ .Name }}</a></li>
                    {{ end }}
                </ul>
            </nav>
        </div>
    </header>
    <main class="content container">
        {{ block "main" . }}{{ end }}
    </main>
    <footer>
        <div class="container">
            <div style="margin-bottom: 1rem; padding: 1rem; background-color: #3d3d3d; border-radius: 8px;">
                <h3 style="color: #61dafb; margin-bottom: 0.8rem; font-size: 1.1rem;">🎮 小游戏</h3>
                <div style="display: flex; flex-wrap: wrap; gap: 1rem; justify-content: center;">
                    <a href="/games/stickman-javelin.html" style="display: inline-block; padding: 0.5rem 1rem; background-color: #444; border-radius: 6px; color: #e0e0e0;">🔫 火柴人标枪对战</a>
                </div>
            </div>
            <p>&copy; {{ now.Format "2006" }} {{ .Site.Title }}. All rights reserved.</p>
        </div>
    </footer>
</body>
</html>
