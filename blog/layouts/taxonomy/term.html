{{ define "main" }}
<h1>{{ .Title }}</h1>
<div class="post-list">
    {{ range .Data.Pages }}
        <div class="post-item">
            <div class="post-title"><a href="{{ .RelPermalink }}">{{ .Title }}</a></div>
            <div class="post-meta">
                <span class="author-badge">{{ .Params.Author }}</span>
                · {{ .Date.Format "2006-01-02" }}
            </div>
        </div>
    {{ end }}
</div>
{{ end }}
